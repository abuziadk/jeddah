<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>خريطة صناديق حفظ المصاحف القديمة - جمعية العناية بالمصحف الشريف بجدة</title>

  <style>
    :root{
      --green:#0B6E4F;
      --green2:#0A5F45;
      --bg-gradient: linear-gradient(135deg,#0B6E4F,#0A5F45);
      --card:#ffffff;
      --text:#111;
      --muted:#444;
      --shadow:0 10px 26px rgba(0,0,0,.15);
      --radius:16px;
    }

    body{
      margin:0;
      font-family:"Tajawal","Cairo",system-ui,-apple-system,Arial,sans-serif;
      background: var(--bg-gradient);
      color:var(--text);
    }

    /* ================= BANNER ================= */
    .image-header.full{
      width:100%;
      background: var(--bg-gradient);
      padding:14px;
      box-sizing:border-box;
    }

    .image-header-inner{
      max-width:1200px;
      margin:auto;
      border-radius:var(--radius);
      overflow:hidden;
      background:#0B6E4F;
      box-shadow:var(--shadow);
    }

    .image-header-inner img{
      width:100%;
      height:auto;
      display:block;
    }

    /* ================= LAYOUT ================= */
    .wrap{
      padding:14px;
      max-width:1200px;
      margin:auto;
      display:grid;
      grid-template-columns:360px 1fr;
      gap:14px;
    }

    @media (max-width:950px){
      .wrap{ grid-template-columns:1fr; }
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panel{ padding:12px; }

    .panel h2{
      margin:0 0 10px;
      font-size:16px;
      color:var(--green);
      font-weight:900;
    }

    .search{
      width:100%;
      padding:10px 12px;
      border:1px solid #ddd;
      border-radius:12px;
      font-size:14px;
      margin-bottom:10px;
      outline:none;
      box-sizing:border-box;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:62vh;
      overflow:auto;
    }

    .item{
      border:1px solid #e7e7e7;
      border-radius:14px;
      padding:10px;
      background:#fff;
    }

    .item .name{
      font-weight:900;
      font-size:14px;
      margin-bottom:4px;
    }

    .item .meta{
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .btn{
      padding:8px 10px;
      border-radius:12px;
      background:var(--green);
      color:#fff;
      font-size:13px;
      font-weight:900;
      text-decoration:none;
      border:1px solid var(--green);
    }

    .btn.secondary{
      background:#fff;
      color:var(--green);
    }

    .map{
      position:relative;
      width:100%;
      padding-top:62%;
      background:#eee;
      border-radius:var(--radius);
      overflow:hidden;
    }

    .map iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
    }

    /* ================= FOOTER ================= */
    footer{
      max-width:1200px;
      margin:14px auto 80px;
      padding:14px;
      background: rgba(255,255,255,.12);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      text-align:center;
      font-size:13px;
      color:#fff;
      backdrop-filter: blur(6px);
    }

    footer a{
      color:#fff;
      font-weight:900;
      text-decoration:none;
      border-bottom:1px dashed rgba(255,255,255,.6);
    }

    /* ================= WHATSAPP BUTTON ================= */
    .whatsapp-float{
      position:fixed;
      bottom:18px;
      left:18px;
      width:56px;
      height:56px;
      background:#25D366;
      color:#fff;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      text-decoration:none;
      box-shadow:0 8px 20px rgba(0,0,0,.25);
      z-index:999;
      transition: transform .2s ease;
    }

    .whatsapp-float:hover{
      transform: scale(1.08);
    }
  </style>
</head>

<body>

<!-- ===== BANNER ===== -->
<div class="image-header full">
  <div class="image-header-inner">
    <img src="header-image.png" alt="جمعية العناية بالمصحف الشريف بجدة">
  </div>
</div>

<div class="wrap">

  <!-- القائمة -->
  <aside class="card">
    <div class="panel">
      <h2>المحافظات والمواقع</h2>
      <input id="q" class="search" type="search" placeholder="ابحث باسم المحافظة…" />
      <div id="list" class="list"></div>
    </div>
  </aside>

  <!-- الخريطة -->
 <main class="card">
  <div class="map">
    <iframe
      src="https://www.google.com/maps/d/embed?mid=16M9tLFhASEnOazJapVRLqgawecGSF1g&ehbc=2E312F"
      loading="lazy"
      allowfullscreen
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>
</main>

</div>

<footer>
  بإشراف <strong>جمعية العناية بالمصحف الشريف – جدة</strong><br>
  للتواصل: <a href="tel:0557733434" style="color:#fff;font-weight:900;">0557733434</a>
</footer>

<!-- زر واتساب -->
<a class="whatsapp-float"
   href="https://wa.me/966548884252"
   target="_blank"
   aria-label="تواصل عبر واتساب">

    <path d="M16 2.67C8.64 2.67 2.67 8.64 2.67 16c0 2.59.77 5.02 2.1 7.06L2 30l7.15-2.75A13.25 13.25 0 0016 29.33c7.36 0 13.33-5.97 13.33-13.33C29.33 8.64 23.36 2.67 16 2.67zm0 24c-2.31 0-4.46-.63-6.32-1.73l-.45-.26-4.24 1.63 1.64-4.13-.29-.43a10.63 10.63 0 01-1.78-5.9C4.56 9.97 9.97 4.56 16 4.56S27.44 9.97 27.44 16 22.03 27.44 16 27.44z"/>

<script>
  const places = [
    { name:"مسجد أبو بكر الصديق – حي الشرفية", lat:21.518364071148454, lng:39.19104966748523, note:"شمال جدة" },
    { name:"مسجد الشعيبي – حي السلامة", lat:21.588307114274127, lng:39.157817042651935, note:"شمال جدة" },
    { name:"مسجد نور الصفا – شارع الأمير ماجد", lat:21.58824369710748, lng:39.19642344725843, note:"شمال جدة" },
    { name:"جامع السلام – حي الصفا", lat:21.576914506508846, lng:39.217790728084196, note:"شمال جدة" },
    { name:"جامع فلسطين – حي الرحاب", lat:21.54471251199488, lng:39.21747272883527, note:"شمال جدة" },
    { name:"جامع السيدة رقية – حي النسيم", lat:21.52021268510122, lng:39.23114754232945, note:"شمال جدة" },
    { name:"جامع نور الإيمان – البوادي", lat:21.58581537907115, lng:39.17232263691126, note:"شمال جدة" },
    { name:"جامع العسيري – المروة", lat:21.613670218713388, lng:39.20860282703393, note:"شمال جدة" },
    { name:"جامع بلال بن رباح – النسيم", lat:21.61189975024496, lng:39.15831019391822, note:"شمال جدة" },
    { name:"صندوق حفظ المصاحف – حي السامر", lat:21.572101671519867, lng:39.241621271164725, note:"شمال جدة" },
	
    { name:"مسجد ابن القيم – حي الروابي", lat:21.47335886811914, lng:39.263955234163475, note:"جنوب جدة" },
    { name:"مسجد بن لادن – حي الجامعة", lat:21.48648838041194, lng:39.259558411043976, note:"جنوب جدة" },
    { name:"مسجد الحمودي – حي الفيحاء", lat:21.486843974637726, lng:39.228238112310706, note:"جنوب جدة" },
    { name:"بجوار قاعة زفاف – الأجاويد", lat:21.421623295421504, lng:39.29447574887615, note:"جنوب جدة" },
    { name:"مسجد الملك سعود – شارع الملك خالد", lat:21.477456652797887, lng:39.202663457670546, note:"جنوب جدة" },
    { name:"مقابل محطة نفط – مدائن الفهد", lat:21.464138763808123, lng:39.22365772883527, note:"جنوب جدة" },
    { name:"الحرازات – بجوار أسواق ديمة سابقًا", lat:21.4675037138468, lng:39.37485127116472, note:"جنوب جدة" }

  ];

  const listEl = document.getElementById("list");
  const qEl = document.getElementById("q");

  const dir=(lat,lng)=>`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  const place=(lat,lng)=>`https://maps.google.com/?q=${lat},${lng}`;

  function render(v=""){
    listEl.innerHTML="";
    places
      .filter(p=>!v || p.name.includes(v))
      .forEach(p=>{
        listEl.innerHTML+=`
          <div class="item">
            <div class="name">${p.name}</div>
            <div class="meta">${p.note}</div>
            <div class="actions">
              <a class="btn" target="_blank" href="${dir(p.lat,p.lng)}">الاتجاهات</a>
              <a class="btn secondary" target="_blank" href="${place(p.lat,p.lng)}">فتح الموقع</a>
            </div>
          </div>`;
      });
  }
  qEl.oninput=e=>render(e.target.value);
  render();
</script>
</body>

</html>
